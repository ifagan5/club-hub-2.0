<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-P97ML6ZP15"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-P97ML6ZP15');

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <link rel="stylesheet" type="text/css" href="../clubhub/login.css">
  <link rel="stylesheet" type="text/css" href="../clubhub/login.css">
  <link rel="stylesheet" type="text/css" href="formValidation.css">
  <link rel="icon" type="image/x-icon" href="images/stab_logo.webp">
  <title>Create Service Opportunity</title>

  <style>
    body {
      background-color: rgba(146, 22, 32, 0.564);
    }
  </style>

</head>
<body>
<header class="head">
  <div class="rightHead">
    <img class="image" src="../../clubhub/images/stab_logo.webp" alt="logo" onClick="location.replace('index.html');">
    <p onClick="location.replace('index.html');">St. Anne's Belfield School</p>
  </div>
  <div class="leftHead">
    <p class="headLink" onClick="location.replace('serviceStudentPage.html');">Back to homepage</p>
  </div>
</header>

<script type="module">
  import {createServiceOpportunity} from './serviceCreateOpportunity.js';
  window.createServiceOpportunity = createServiceOpportunity;
</script>

<div class="loginBox">
  <header class="subheading">Create Service Opportunity</header>
  <form id="loginForm">
  <label for="opportunityName">Name Of Opportunity:</label><input required type="text" id="opportunityName" placeholder = "Type Here">
  <label for="opportunityDescription">Description Of Opportunity:</label><input required type="text" id="opportunityDescription" placeholder = "Type Here">
  <label for="opportunityLengthHours">Length Of Opportunity (Hours):</label><input required type="number" id="opportunityLengthHours" step = "any" placeholder = "Hours">
  <label for="opportunityLengthMinutes">Length Of Opportunity (Minutes):</label><input required type="number" id="opportunityLengthMinutes" step = "any" placeholder = "Minutes">
  <label for="opportunityDate" id="opportunityDateLabel">Date of Opportunity:</label><input required type="date" id="opportunityDate">
  <label for="opportunityTime">Time of Opportunity:</label><input required type="time" id="opportunityTime">
  <label for="opportunityContact">Person of Contact:</label><input required type="text" id="opportunityContact" placeholder = "Type Here">
  <label for="opportunityLocation">Location of Opportunity:</label><input required type="text" id="opportunityLocation" placeholder = "Type Here">
    <label for="reoccurringEventCheckbox">Make Reoccurring Event (implemented):</label><input type="checkbox" id="reoccurringEventCheckbox">
  </form>

  <form style="display: none;" id = "opportunityForm">
    <label for="cb-1">Repeat On Monday:</label><input type="checkbox" id="cb-1">
    <label for="cb-2">Repeat On Tuesday:</label><input type="checkbox" id="cb-2">
    <label for="cb-3">Repeat On Wednesday:</label><input type="checkbox" id="cb-3">
    <label for="cb-4">Repeat On Thursday:</label><input type="checkbox" id="cb-4">
    <label for="cb-5">Repeat On Friday:</label><input type="checkbox" id="cb-5">
    <label for="cb-6">Repeat On Saturday:</label><input type="checkbox" id="cb-6">
    <label for="cb-7">Repeat On Sunday:</label><input type="checkbox" id="cb-7">
    <label for="repeatTimes">Amount Of Times To Repeat:</label><input required type="number" id="repeatTimes">
  </form>
  <button onclick="createServiceOpportunity(document.getElementById('opportunityName').value, document.getElementById('opportunityDescription').value, document.getElementById('opportunityLengthHours').value, document.getElementById('opportunityLengthMinutes').value, document.getElementById('opportunityDate').value, document.getElementById('opportunityTime').value, document.getElementById('opportunityContact').value, document.getElementById('opportunityLocation').value);" class="loginButton clubLB">Create</button>
</div>
</body>
</html>
