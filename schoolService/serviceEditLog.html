  import {updateServiceLog} from './serviceEditLog.js';
  window.updateServiceLog = updateServiceLog;
</script>

  <header class="subheading">Edit Service Log</header>
  <form id="editForm">
  <label for="description">Description Of Opportunity:</label><input required type="text" id="description" placeholder = "Type Here">
  <label for="hours">Length Of Opportunity:</label><input required type="number" id="hours" step = "any" placeholder = "Type Here">
  <label for="date">Date of Opportunity:</label><input required type="date" id="date">
  <label for="contact">Person of Contact:</label><input required type="text" id="contact" placeholder = "Type Here">
